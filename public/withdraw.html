<!DOCTYPE html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Çekim Paneli</title><style>body{font-family:Arial;background:#0f1115;color:#fff;margin:0;padding:16px}.card{background:#191d26;border:1px solid #2c3340;border-radius:12px;padding:14px;margin-bottom:12px}input,button{width:100%;padding:11px;border-radius:10px;border:1px solid #2c3340;background:#111827;color:#fff;margin-top:8px}.btn{background:#2563eb;font-weight:700}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #2c3340;text-align:left;font-size:13px}</style></head><body>
<div class='card'><h2>💸 Pro Çekim Sayfası</h2><p>Min: 0.15 TON | Ücret: 0.01 TON</p><input id='wallet' placeholder='TON Cüzdan Adresi'><input id='amount' type='number' step='0.001' placeholder='Miktar TON'><button class='btn' id='send'>Çekim Talebi Gönder</button></div>
<div class='card'><h3>Çekim Geçmişi</h3><table><thead><tr><th>Tarih</th><th>Wallet</th><th>Miktar</th><th>Durum</th></tr></thead><tbody id='rows'></tbody></table></div>
<script>
const userId=new URLSearchParams(location.search).get('userId')||'testuser';
async function load(){const r=await fetch(`/api/user/${userId}/history`);const h=await r.json();document.getElementById('rows').innerHTML=(h||[]).map(x=>`<tr><td>${new Date(x.date).toLocaleString('tr-TR')}</td><td>${x.number}</td><td>${Number(x.amount).toFixed(3)} TON</td><td>${x.status}</td></tr>`).join('')||'<tr><td colspan="4">Kayıt yok</td></tr>';}
document.getElementById('send').onclick=async()=>{const amount=Number(document.getElementById('amount').value||0);const wallet=document.getElementById('wallet').value.trim();const r=await fetch(`/api/user/${userId}/withdraw`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount,walletAddress:wallet})});const d=await r.json();if(!r.ok)return alert(d.error||'Hata');alert(d.message);load();};
load();
</script></body></html>
