<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tonexa Ads Pro V3</title>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #070b10;
            --card: #121820;
            --primary: #0088cc;
            --accent: #00d2ff;
            --text: #ffffff;
            --text-dim: #8e97a2;
            --success: #00c853;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        /* Screens */
        .screen { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Shared UI Elements */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        /* Balance & Stats */
        .balance-hero { text-align: center; padding: 30px 0; }
        .balance-hero h1 { font-size: 42px; margin: 10px 0; color: var(--primary); }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; }

        /* Withdraw Specific */
        .quick-amounts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .amount-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 10px; font-size: 14px; }
        .amount-btn.selected { border-color: var(--primary); background: rgba(0,136,204,0.1); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input { width: 100%; background: #1a222c; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: white; outline: none; }

        /* Navigation */
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(18,24,32,0.95); backdrop-filter: blur(10px); border-radius: 20px; display: flex; padding: 8px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); text-decoration: none; font-size: 10px; padding: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 5px; }
        .nav-item.active { color: var(--primary); background: rgba(0,136,204,0.05); }

        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div></div>

    <!-- ANA SAYFA -->
    <div id="home" class="screen active">
        <div class="balance-hero">
            <span style="font-size: 12px; color: var(--text-dim); letter-spacing: 2px;">TON BAKİYE</span>
            <h1 id="ui-bal">0.0000</h1>
            <div style="color: var(--success); font-size: 13px;">Online: <span id="ui-status">Bağlı</span></div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div style="font-size: 18px; font-weight: bold;" id="ui-ads-today">0/100</div>
                <div style="font-size: 10px; color: var(--text-dim);">GÜNLÜK GÖREV</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 18px; font-weight: bold;" id="ui-refs">0</div>
                <div style="font-size: 10px; color: var(--text-dim);">DAVETLER</div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px; text-align: center;">
            <p style="font-size: 13px; color: var(--text-dim);">Her reklamda <b style="color:white;">0.002 TON</b> kazanırsın.</p>
            <button class="btn" id="ad-btn" onclick="playAd()">
                <i class="fas fa-play"></i> REKLAM İZLE VE KAZAN
            </button>
        </div>
    </div>

    <!-- CÜZDAN / ÇEKİM -->
    <div id="wallet" class="screen">
        <h2 style="margin-top: 0;">Cüzdan</h2>
        <div class="card">
            <div class="input-group">
                <label>ÇEKİLEBİLİR MİKTAR</label>
                <input type="number" id="withdraw-amount" placeholder="0.00" readonly>
            </div>
            <div class="quick-amounts">
                <button class="amount-btn" onclick="setAmount(0.10)">0.10</button>
                <button class="amount-btn" onclick="setAmount(0.50)">0.50</button>
                <button class="amount-btn" onclick="setAmount('max')">MAX</button>
            </div>
            <div class="input-group">
                <label>TON CÜZDAN ADRESİ</label>
                <input type="text" id="wallet-address-display" placeholder="Ayarlardan adres ekleyin" readonly>
            </div>
            <button class="btn" id="withdraw-btn" onclick="submitWithdraw()">
                <i class="fas fa-paper-plane"></i> ÇEKİM TALEBİ GÖNDER
            </button>
            <p style="font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 15px;">
                * Minimum çekim 0.10 TON'dur. Talepler 24 saat içinde işlenir.
            </p>
        </div>
    </div>

    <!-- AYARLAR / PROFİL -->
    <div id="settings" class="screen">
        <h2 style="margin-top: 0;">Ayarlar</h2>
        <div class="card">
            <div class="input-group">
                <label>AD SOYAD</label>
                <input type="text" id="set-name" readonly>
            </div>
            <div class="input-group">
                <label>TON CÜZDAN ADRESİ (Kaydet/Güncelle)</label>
                <input type="text" id="set-wallet" placeholder="UQ... veya EQ... ile başlayan adres">
            </div>
            <button class="btn btn-outline" onclick="saveWallet()">
                <i class="fas fa-save"></i> ADRESİ KAYDET
            </button>
        </div>

        <div class="card" style="text-align: center;">
            <p style="font-size: 13px; margin-bottom: 15px;">Arkadaşlarını davet et, her kayıt olan için <b>0.01 TON</b> kazan!</p>
            <button class="btn" onclick="copyRef()">
                <i class="fas fa-user-plus"></i> REFERANS LİNKİNİ KOPYALA
            </button>
        </div>
    </div>

    <nav class="nav">
        <a href="javascript:void(0)" onclick="switchTab('home', this)" class="nav-item active">
            <i class="fas fa-home"></i><span>ANA SAYFA</span>
        </a>
        <a href="javascript:void(0)" onclick="switchTab('wallet', this)" class="nav-item">
            <i class="fas fa-wallet"></i><span>CÜZDAN</span>
        </a>
        <a href="javascript:void(0)" onclick="switchTab('settings', this)" class="nav-item">
            <i class="fas fa-cog"></i><span>AYARLAR</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://tonexa.onrender.com"; // Burayı kendi Render URL'inle değiştir
        let userState = null;

        // Init Ads
        if (window.TelegramAdsController) {
            window.TelegramAdsController.initialize({ pubId: "988708", appId: "7279" });
        }

        async function init() {
            tg.expand();
            const user = tg.initDataUnsafe.user || { id: "6296765793", first_name: "Test User" };
            
            document.getElementById('set-name').value = user.first_name;

            try {
                const res = await fetch(`${API}/api/sync`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: user.id,
                        first_name: user.first_name,
                        username: user.username,
                        start_param: tg.initDataUnsafe.start_param
                    })
                });
                userState = await res.json();
                updateUI();
            } catch (e) {
                tg.showAlert("Sunucu bağlantı hatası!");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateUI() {
            document.getElementById('ui-bal').innerText = userState.balance.toFixed(4);
            document.getElementById('ui-ads-today').innerText = `${userState.adsToday}/100`;
            document.getElementById('ui-refs').innerText = userState.totalInvited || 0;
            
            // Cüzdan Adresi Sync
            const wInput = document.getElementById('set-wallet');
            const wDisplay = document.getElementById('wallet-address-display');
            if (userState.walletAddress) {
                wInput.value = userState.walletAddress;
                wDisplay.value = userState.walletAddress;
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function setAmount(val) {
            const input = document.getElementById('withdraw-amount');
            if (val === 'max') {
                input.value = userState.balance.toFixed(2);
            } else {
                input.value = val;
            }
            tg.HapticFeedback.selectionChanged();
        }

        async function saveWallet() {
            const addr = document.getElementById('set-wallet').value.trim();
            if (addr.length < 10) return tg.showAlert("Geçerli bir TON adresi girin!");

            try {
                const res = await fetch(`${API}/api/user/update-wallet`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: userState.uid, walletAddress: addr })
                });
                const data = await res.json();
                if (data.success) {
                    userState.walletAddress = addr;
                    updateUI();
                    tg.showAlert("Cüzdan adresiniz başarıyla kaydedildi!");
                }
            } catch (e) { tg.showAlert("Hata oluştu!"); }
        }

        async function playAd() {
            const btn = document.getElementById('ad-btn');
            if (userState.adsToday >= 100) return tg.showAlert("Günlük limite ulaştınız!");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> YÜKLENİYOR...';

            window.TelegramAdsController.playAd({
                type: 'rewarded',
                onCompleted: async () => {
                    const res = await fetch(`${API}/api/reward`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: userState.uid })
                    });
                    const data = await res.json();
                    userState.balance = data.balance;
                    userState.adsToday += 1;
                    updateUI();
                    tg.HapticFeedback.notificationOccurred('success');
                    resetAdBtn();
                },
                onFailed: () => {
                    tg.showAlert("Reklam yüklenemedi.");
                    resetAdBtn();
                }
            });
        }

        function resetAdBtn() {
            const btn = document.getElementById('ad-btn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> REKLAM İZLE VE KAZAN';
        }

        async function submitWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const addr = userState.walletAddress;

            if (!addr) return tg.showAlert("Lütfen önce Ayarlar'dan cüzdan adresinizi kaydedin!");
            if (isNaN(amount) || amount < 0.10) return tg.showAlert("Minimum çekim 0.10 TON'dur.");
            if (amount > userState.balance) return tg.showAlert("Yetersiz bakiioe!");

            try {
                const res = await fetch(`${API}/api/withdraw`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: userState.uid, address: addr, amount })
                });
                const data = await res.json();
                if (data.success) {
                    userState.balance -= amount;
                    updateUI();
                    tg.showAlert("Çekim talebiniz alındı. İncelendikten sonra gönderilecektir.");
                }
            } catch (e) { tg.showAlert("Sunucu hatası!"); }
        }

        function copyRef() {
            const link = `https://t.me/TonexaAdsBot?start=${userState.uid}`;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert("Referans linkiniz kopyalandı!");
        }

        window.onload = init;
    </script>
</body>
</html>
