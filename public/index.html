<!DOCTYPE html>
<html lang="tr">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Fira+Code:wght@400;700&family=Inter:wght@400;900&display=swap');

        :root {
            --sketch-black: #1a1a1a;
            --ton-blue: #0088cc;
            --blueprint-bg: #f0f4f8;

        .nav-item {

            background: white;
            border: 2px solid var(--sketch-black);

            box-shadow: 4px 4px 0px var(--sketch-black);

        .nav-item::after {
            content: "REC";

        /* Çark */
        .wheel-container {

        #wheel-canvas {
            width: 100%;

            filter: drop-shadow(2px 2px 0px #fff);
        }

        /* Modal Sistemi */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(240, 244, 248, 0.95);

<body>

    <!-- UI Stats -->
    <div class="p-4 grid grid-cols-2 gap-3">
        <div class="premium-card p-2">

                <span class="font-black text-xl" id="stat-art">0</span>
            </div>
        </div>
        <div class="premium-card p-2">
            <span class="text-[8px] font-black opacity-40 uppercase block">TON Liquidity</span>
            <div class="flex items-center gap-2">
                <i class="fas fa-gem text-blue-500 text-xs"></i>
                <span class="font-black text-xl text-blue-600" id="stat-ton">0.000</span>
            </div>
        </div>
    </div>

    <div class="px-4">
        <div class="premium-card p-2 bg-blue-50 border-dashed flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold opacity-50 uppercase leading-none">Energy Reserve</span>
                <div id="energy-dots" class="flex gap-1 mt-1"></div>
            </div>
            <div class="text-right">
                <span id="stat-spins" class="font-black text-xl">0</span>
                <span class="text-[10px] opacity-30">/5</span>

        </div>

    <!-- Nav -->
    <div class="side-nav">
        <button class="nav-item" onclick="openPage('wallet')"><i class="fas fa-wallet text-xl"></i></button>
        <button class="nav-item" onclick="openPage('swap')"><i class="fas fa-right-left text-xl"></i></button>
        <button class="nav-item" onclick="openPage('friends')"><i class="fas fa-users-gear text-xl"></i></button>
        <button class="nav-item" onclick="openPage('promo')"><i class="fas fa-tags text-xl"></i></button>
    </div>

    <!-- Game -->
    <div class="flex flex-col items-center mt-6">
        <div class="wheel-container">
            <div class="pointer"><i class="fas fa-thumbtack"></i></div>
            <canvas id="wheel-canvas" width="800" height="800"></canvas>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-12 h-12 bg-white border-4 border-black rounded-full flex items-center justify-center shadow-lg">
                    <div class="w-1 h-1 bg-black rounded-full"></div>
                </div>
            </div>
        </div>

        <button id="spin-btn" onclick="handleSpin()" class="premium-card mt-12 px-16 py-5 bg-black text-white text-2xl font-black sketch-font italic tracking-widest active:scale-95">
            EXECUTE SPIN
        </button>
        
        <div class="mt-8 text-center opacity-30">
            <p class="text-[9px] font-bold uppercase tracking-[0.4em]">Artisan Records & Engineering v4.2</p>
            <p class="text-[7px] font-mono mt-1">S/N: 772-BLUE-PRINT-X</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" onclick="closePage()">
        <div class="modal-body premium-card p-6 overflow-hidden" onclick="event.stopPropagation()">
            <div class="stamp top-4 right-4 text-[10px]" id="modal-stamp">TOP SECRET</div>
            <div class="flex justify-between items-start mb-6 border-b-2 border-black pb-3">
                <div>
                    <h2 id="modal-title" class="sketch-font text-2xl font-bold italic uppercase leading-none">Title</h2>
                    <p class="text-[8px] font-black opacity-40 mt-1 uppercase">Technical Documentation</p>
                </div>
                <button onclick="closePage()" class="text-4xl leading-none">&times;</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="sketch-font">RECORD UPDATED</div>

    <script>
        const tg = window.Telegram.WebApp;
        
        let state = {
            art: 500,
            ton: 0.150,
            spins: 0,
            wallet: localStorage.getItem('art_wallet') || '',
            minWithdraw: 0.2,
            hasClaimedGift: localStorage.getItem('gift_claimed_v2') === 'true'
        };

        const sectors = [
            { label: "15 ART", val: 15, type: 'art', color: "#fff", text: "#000" },
            { label: "0.01 TON", val: 0.01, type: 'ton', color: "#0088cc", text: "#fff" },
            { label: "25 ART", val: 25, type: 'art', color: "#f8f9fa", text: "#000" },
            { label: "0.02 TON", val: 0.02, type: 'ton', color: "#1a1a1a", text: "#fff" },
            { label: "20 ART", val: 20, type: 'art', color: "#fff", text: "#000" },
            { label: "0.01 TON", val: 0.01, type: 'ton', color: "#0088cc", text: "#fff" },
            { label: "50 ART", val: 50, type: 'art', color: "#dfe6e9", text: "#000" },
            { label: "0.01 TON", val: 0.01, type: 'ton', color: "#2d3436", text: "#fff" }
        ];

        let rotation = 0;
        let spinning = false;

        function init() {
            tg.expand();
            drawWheel();
            updateUI();
            
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                if(!state.hasClaimedGift) showGiftPopup();
            }, 1500);
        }

        function updateUI() {
            document.getElementById('stat-art').innerText = Math.floor(state.art);
            document.getElementById('stat-ton').innerText = state.ton.toFixed(3);
            document.getElementById('stat-spins').innerText = state.spins;

            const dots = document.getElementById('energy-dots');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = `w-2 h-2 rounded-sm border border-black rotate-45 ${i < state.spins ? 'bg-blue-500' : 'bg-transparent'}`;
                dots.appendChild(d);
            }
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const slice = (Math.PI * 2) / sectors.length;

            sectors.forEach((s, i) => {
                const angle = i * slice;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(400, 400);
                ctx.arc(400, 400, 385, angle, angle + slice);
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#1a1a1a";
                ctx.stroke();

                ctx.save();
                ctx.translate(400, 400);
                ctx.rotate(angle + slice/2);
                ctx.textAlign = "right";
                ctx.fillStyle = s.text;
                ctx.font = "bold 36px Inter";
                ctx.fillText(s.label, 350, 14);
                ctx.restore();
            });
        }

        function showGiftPopup() {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-stamp').innerText = "CERTIFIED";
            
            title.innerText = "INITIAL GRANT";
            content.innerHTML = `
                <div class="text-center py-6">
                    <div class="relative inline-block mb-4">
                        <i class="fas fa-box-open text-7xl text-orange-400"></i>
                        <div class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-2 py-1 font-black rounded border-2 border-black">URGENT</div>
                    </div>
                    <p class="sketch-font text-2xl mb-2">Artisan Welcome Pack</p>
                    <p class="text-[10px] opacity-40 mb-6 uppercase">Assigned to your engineering profile</p>
                    <div class="premium-card p-6 bg-blue-50 mb-8 border-dashed flex justify-around items-center">
                        <div class="text-center"><span class="block font-black text-2xl">+2</span><span class="text-[8px] uppercase">Spins</span></div>
                        <div class="h-8 w-[2px] bg-black opacity-10"></div>
                        <div class="text-center"><span class="block font-black text-2xl">50</span><span class="text-[8px] uppercase">Art</span></div>
                    </div>
                    <button onclick="claimGift()" class="w-full premium-card p-5 bg-black text-white font-black italic text-xl">OPEN RECORD</button>
                </div>
            `;
            overlay.classList.add('active');
        }

        window.claimGift = () => {
            state.spins += 2;
            state.art += 50;
            state.hasClaimedGift = true;
            localStorage.setItem('gift_claimed_v2', 'true');
            updateUI();
            closePage();
            showToast("GRANTS RECEIVED");
        };

        function handleSpin() {
            if (spinning || state.spins <= 0) {
                if(state.spins <= 0) showToast("LOW ENERGY");
                return;
            }
            spinning = true;
            state.spins--;
            updateUI();

            const extra = 8 + Math.random() * 6;
            const deg = Math.floor(Math.random() * 360);
            rotation += (extra * 360) + deg;
            
            document.getElementById('wheel-canvas').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                spinning = false;
                const actual = rotation % 360;
                const index = Math.floor((360 - (actual % 360) + 270) % 360 / (360/sectors.length));
                const win = sectors[index];
                
                if(win.type === 'art') state.art += win.val;
                else state.ton += win.val;

                updateUI();
                showToast(`GAINED: ${win.label}`);
            }, 6000);
        }

        function openPage(page) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            const title = document.getElementById('modal-title');
            const stamp = document.getElementById('modal-stamp');
            
            overlay.classList.remove('closing');
            overlay.classList.add('active');

            switch(page) {
                case 'promo':
                    stamp.innerText = "MARKETING";
                    title.innerText = "PROMO CODES";
                    content.innerHTML = `
                        <div class="space-y-5">
                            <div class="premium-card p-4 bg-orange-50 border-dashed text-center">
                                <i class="fab fa-telegram text-4xl text-blue-500 mb-2"></i>
                                <p class="font-black text-sm uppercase">Resmi Telegram Kanalı</p>
                                <p class="text-[10px] opacity-60 mb-3">Kodlar ve güncellemeler anlık olarak kanalda paylaşılmaktadır!</p>
                                <a href="#" class="inline-block px-6 py-2 bg-blue-500 text-white font-black text-xs rounded border-2 border-black">KANALA KATIL</a>
                            </div>
                            <div class="relative">
                                <p class="text-[9px] font-black opacity-40 mb-1 uppercase px-1">Giriş Yap</p>
                                <input type="text" id="p-code" class="w-full p-4 border-2 border-black rounded-lg text-center font-bold tracking-widest uppercase outline-none sketch-font text-xl" placeholder="KOD-GIRINIZ">
                            </div>
                            <button onclick="redeem()" class="w-full premium-card p-4 bg-black text-white font-black italic">AKTİVE ET</button>
                        </div>
                    `;
                    break;
                case 'wallet':
                    stamp.innerText = "FINANCIAL";
                    title.innerText = "TON WITHDRAW";
                    content.innerHTML = `
                        <div class="space-y-5">
                            <div class="grid grid-cols-2 gap-2">
                                <div class="premium-card p-3 bg-gray-50">
                                    <span class="text-[8px] block opacity-40">MINIMUM</span>
                                    <span class="font-black">0.200 TON</span>
                                </div>
                                <div class="premium-card p-3 bg-gray-50 text-right">
                                    <span class="text-[8px] block opacity-40">AVAILABLE</span>
                                    <span class="font-black text-blue-600">${state.ton.toFixed(3)} TON</span>
                                </div>
                            </div>
                            <div class="premium-card p-4">
                                <p class="text-[10px] font-black opacity-40 mb-2 uppercase">Destinasyon Adresi</p>
                                <input type="text" id="w-addr" value="${state.wallet}" class="w-full font-mono text-xs outline-none border-b-2 border-dotted border-black pb-1" placeholder="UQA123...">
                            </div>
                            <div class="premium-card p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <p class="text-[10px] font-black opacity-40 uppercase">Çekilecek Miktar</p>
                                    <button onclick="setMax()" class="text-[9px] bg-black text-white px-2 py-0.5 rounded font-black">MAX</button>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="w-amount" class="w-full text-2xl font-black outline-none" placeholder="0.000">
                                    <span class="font-black opacity-30">TON</span>
                                </div>
                            </div>
                            <button onclick="doWithdraw()" class="w-full premium-card p-5 bg-blue-600 text-white font-black italic text-lg">HESABA AKTAR</button>
                            <p class="text-[8px] text-center opacity-40 italic">Not: Transferler teknik incelemeden sonra 24 saat içinde tamamlanır.</p>
                        </div>
                    `;
                    break;
                case 'swap':
                    stamp.innerText = "EXCHANGE";
                    title.innerText = "ASSET SWAP";
                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="premium-card p-5 bg-white">
                                <div class="flex justify-between text-[10px] font-black opacity-40 mb-2 uppercase"><span>Giriş</span><span>Bakiye: ${state.art}</span></div>
                                <div class="flex items-center gap-3">
                                    <input type="number" id="s-val" oninput="calc(this.value)" class="text-3xl font-black w-full outline-none" placeholder="1000">
                                    <span class="font-black">ART</span>
                                </div>
                            </div>
                            <div class="flex justify-center -my-2 relative z-10">
                                <div class="bg-black text-white p-2 rounded-full border-2 border-white shadow-lg"><i class="fas fa-arrow-down"></i></div>
                            </div>
                            <div class="premium-card p-5 bg-blue-50">
                                <div class="flex justify-between text-[10px] font-black opacity-40 mb-2 uppercase"><span>Çıkış (Tahmini)</span></div>
                                <div class="flex items-center gap-3">
                                    <div id="calc-res" class="text-3xl font-black text-blue-600">0.000</div>
                                    <span class="font-black text-blue-600">TON</span>
                                </div>
                            </div>
                            <div class="p-3 border-2 border-black border-dashed rounded bg-gray-50">
                                <p class="text-[9px] font-black opacity-50 uppercase">Swap Şartı</p>
                                <p class="text-[10px] italic">10,000 ART = 1 TON oranında teknik dönüşüm uygulanır.</p>
                            </div>
                            <button onclick="executeSwap()" class="w-full premium-card p-5 bg-black text-white font-black italic">DÖNÜŞÜMÜ BAŞLAT</button>
                        </div>
                    `;
                    break;
                case 'friends':
                    stamp.innerText = "NETWORK";
                    title.innerText = "ENGINEER LOG";
                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="premium-card p-6 text-center bg-yellow-50">
                                <p class="sketch-font text-xl mb-2">Ağını Genişlet!</p>
                                <p class="text-[10px] opacity-60 uppercase mb-4">Her yeni mühendis için +1 Enerji kaydı açılır.</p>
                                <div class="flex justify-center gap-4">
                                    <div class="text-center"><span class="block font-black text-lg">0</span><span class="text-[8px] opacity-40 uppercase">Referans</span></div>
                                    <div class="text-center"><span class="block font-black text-lg text-green-600">+0</span><span class="text-[8px] opacity-40 uppercase">Toplam Ton</span></div>
                                </div>
                            </div>
                            <div class="premium-card p-4 border-dashed">
                                <p class="text-[10px] font-black opacity-40 mb-2 uppercase">Davet Linkin</p>
                                <div class="bg-gray-100 p-2 text-[10px] font-mono break-all border border-black rounded">https://t.me/tonexa_bot?start=user${Math.floor(Math.random()*9999)}</div>
                            </div>
                            <button onclick="copyLink()" class="w-full premium-card p-5 bg-black text-white font-black italic">LİNKİ KOPYALA</button>
                        </div>
                    `;
                    break;
            }
        }

        function closePage() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('closing');
            setTimeout(() => {
                overlay.classList.remove('active');
                overlay.classList.remove('closing');
            }, 400);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Logic Functions
        window.setMax = () => {
            document.getElementById('w-amount').value = state.ton.toFixed(3);
        };

        window.doWithdraw = () => {
            const amt = parseFloat(document.getElementById('w-amount').value);
            const addr = document.getElementById('w-addr').value;
            
            if(!addr || addr.length < 10) return tg.showAlert("Geçersiz cüzdan adresi!");
            if(isNaN(amt) || amt < state.minWithdraw) return tg.showAlert(`Minimum çekim miktarı ${state.minWithdraw} TON olmalıdır!`);
            if(amt > state.ton) return tg.showAlert("Yetersiz bakiye!");

            state.wallet = addr;
            localStorage.setItem('art_wallet', addr);
            tg.showAlert(`Çekim talebi alındı: ${amt} TON.\nİncelemeden sonra gönderilecektir.`);
            closePage();
        };

        window.calc = (v) => {
            document.getElementById('calc-res').innerText = (v * 0.0001).toFixed(3);
        };

        window.redeem = () => {
            const code = document.getElementById('p-code').value;
            if(!code) return;
            tg.showAlert("Bu kod sistemde taranıyor...");
            closePage();
            showToast("PROCESS LOGGED");
        };

        window.copyLink = () => {
            showToast("LINK COPIED");
        };

        window.onload = init;
    </script>
</body>
</html>
