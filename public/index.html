<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonexa Spin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0f172a;color:#fff} .card{background:#111827;border:1px solid #334155;border-radius:14px} </style>
</head>
<body class="min-h-screen p-4">
  <audio id="bg-audio" src="/background.mp3" loop></audio>
  <audio id="click-audio" src="/click.mp3"></audio>

  <div class="max-w-4xl mx-auto space-y-4">
    <div class="card p-4 flex items-center justify-between">
      <div class="flex items-center gap-3"><img src="/toncoin.png" onerror="this.style.display='none'" class="w-9 h-9"><h1 class="font-bold text-xl">TONEXA AAA</h1></div>
      <button onclick="playClick();toggleMusic()" class="bg-cyan-600 px-3 py-2 rounded">Müzik Aç/Kapat</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="card p-3">ART: <b id="art">0</b></div><div class="card p-3">TON: <b id="ton">0.000</b></div>
      <div class="card p-3">Spin: <b id="spins">0</b></div><div class="card p-3">Reklam: <b id="ads">0</b>/50</div>
    </div>

    <div class="card p-4 text-center">
      <div class="text-4xl">📌</div>
      <canvas id="wheel" width="420" height="420" class="mx-auto"></canvas>
      <button id="spinBtn" onclick="spin()" class="mt-3 bg-emerald-600 px-4 py-2 rounded font-bold">SPIN ÇEVİR</button>
      <button onclick="watchAd()" class="mt-3 ml-2 bg-amber-600 px-4 py-2 rounded font-bold">REKLAM İZLE (+1)</button>
    </div>

    <div class="card p-4">
      <h2 class="font-bold mb-2">Admin</h2>
      <div class="flex flex-wrap gap-2">
        <button class="bg-slate-700 px-3 py-2 rounded" onclick="adminPage('promo')">Promo Yönetimi</button>
        <button class="bg-slate-700 px-3 py-2 rounded" onclick="adminPage('users')">Kullanıcılar</button>
        <button class="bg-slate-700 px-3 py-2 rounded" onclick="adminPage('records')">Kayıtlar</button>
      </div>
      <div id="adminContent" class="mt-3 text-sm text-slate-200">Butona basınca sayfa burada açılır.</div>
    </div>
  </div>

<script>
const userId='demo';
const sectors=[
{label:'15 ART',color:'#fef08a',text:'#111',type:'art',val:15},
{label:'0.01 TON',color:'#38bdf8',text:'#fff',type:'ton',val:0.01},
{label:'25 ART',color:'#fca5a5',text:'#111',type:'art',val:25},
{label:'20 ART',color:'#86efac',text:'#111',type:'art',val:20},
{label:'50 ART',color:'#c4b5fd',text:'#111',type:'art',val:50},
{label:'10 ART',color:'#fdba74',text:'#111',type:'art',val:10},
{label:'35 ART',color:'#f9a8d4',text:'#111',type:'art',val:35},
{label:'5 ART',color:'#93c5fd',text:'#111',type:'art',val:5},
];
let state={art:0,ton:0,spins:0,adWatchCount:0}; let rotation=0; let spinning=false;
const c=document.getElementById('wheel'),ctx=c.getContext('2d');

async function api(url,m='GET',b){const r=await fetch(url,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});const j=await r.json();if(!r.ok)throw new Error(j.error||'ERR');return j}
function playClick(){const a=document.getElementById('click-audio');a.currentTime=0;a.play().catch(()=>{});} function toggleMusic(){const a=document.getElementById('bg-audio');if(a.paused)a.play().catch(()=>{});else a.pause()}
function draw(){ctx.clearRect(0,0,420,420);const slice=Math.PI*2/sectors.length;sectors.forEach((s,i)=>{const a=i*slice;ctx.beginPath();ctx.moveTo(210,210);ctx.arc(210,210,190,a,a+slice);ctx.fillStyle=s.color;ctx.fill();ctx.strokeStyle='#0f172a';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.translate(210,210);ctx.rotate(a+slice/2);ctx.fillStyle=s.text;ctx.font='bold 17px sans-serif';ctx.textAlign='right';ctx.fillText(s.label,170,6);ctx.restore();});}
function pickedIndex(finalDeg){const normalized=((360-(finalDeg%360))+22.5)%360;return Math.floor(normalized/45)%sectors.length;}
function bind(){art.textContent=Math.floor(state.art);ton.textContent=Number(state.ton).toFixed(3);spins.textContent=state.spins;ads.textContent=state.adWatchCount||0;}

async function init(){draw(); state=await api(`/api/state?userId=${userId}`); bind();}
async function spin(){if(spinning)return; if(state.spins<=0)return alert('Spin bitti, reklam izle.'); playClick(); spinning=true; const turns=8+Math.floor(Math.random()*4); const extra=Math.floor(Math.random()*360); rotation += turns*360 + extra; c.style.transition='transform 6s cubic-bezier(.15,0,.15,1)'; c.style.transform=`rotate(${rotation}deg)`; const idx=pickedIndex(rotation); setTimeout(async()=>{try{const r=await api('/api/spin','POST',{userId,index:idx}); state={...state,...r}; bind(); alert(`Ödül: ${sectors[idx].label}`);}catch(e){alert(e.message)} finally{spinning=false;} },6100)}
async function watchAd(){try{playClick(); const r=await api('/api/watch-ad','POST',{userId}); state={...state,...r}; bind();}catch(e){alert(e.message==='AD_LIMIT_REACHED'?'Günlük 50 reklam limitine ulaştın.':e.message)}}
async function adminPage(p){playClick(); if(p==='promo'){const promos=await api('/api/admin/promos'); adminContent.innerHTML=`<b>Promo Listesi</b><br>${promos.map(x=>`${x.id} - ödül:${x.reward} max:${x.maxUses} kullanılan:${x.used||0}`).join('<br>')||'Promo yok'}`; return;} if(p==='users')adminContent.textContent='Kullanıcı sayfası hazır.'; if(p==='records'){const rec=await api(`/api/records?userId=${userId}`); adminContent.textContent=JSON.stringify(rec,null,2);} }
init();
</script>
</body>
</html>
