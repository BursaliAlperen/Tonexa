<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tonexa Pro W2E</title>
    <!-- SDKs -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0F14;
            --surface: #161C24;
            --primary: #0088CC;
            --accent: #00F2FE;
            --text: #FFFFFF;
            --dim: #919EAB;
            --success: #54D62C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Yükleme Ekranı */
        #splash {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }

        .loader {
            width: 45px; height: 45px;
            border: 4px solid var(--surface);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Ana İçerik */
        #app {
            flex: 1; padding: 20px;
            display: flex; flex-direction: column;
            max-width: 500px; margin: 0 auto; width: 100%;
            overflow-y: auto; padding-bottom: 100px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: 2px; color: var(--primary); }

        .card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .balance-label { font-size: 12px; color: var(--dim); font-weight: 600; letter-spacing: 1px; }
        .balance-amount { font-size: 42px; font-weight: 800; margin: 10px 0; display: flex; align-items: baseline; gap: 8px; }
        .balance-amount span { background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-unit { font-size: 16px; color: var(--primary); }

        .btn {
            background: var(--primary);
            color: white; border: none; padding: 18px;
            border-radius: 18px; font-weight: 700; font-size: 16px;
            width: 100%; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-container { margin: 20px 0; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 0.5s; }

        /* Admin Tag */
        .admin-badge {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000; font-size: 10px; font-weight: 900;
            padding: 4px 8px; border-radius: 6px; margin-left: 10px;
        }

        /* Navigasyon */
        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(15px);
            border-radius: 22px; display: flex; padding: 10px;
            border: 1px solid rgba(255,255,255,0.08); z-index: 100;
        }

        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 5px; color: var(--dim); text-decoration: none; font-size: 10px; font-weight: 700;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 18px; }

        #admin-section { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader"></div>
        <div style="margin-top: 20px; font-weight: 800; letter-spacing: 3px;">TONEXA PRO</div>
    </div>

    <div id="app">
        <div class="header">
            <div class="logo">TONEXA <span id="admin-indicator"></span></div>
            <div id="user-display" style="font-size: 12px; font-weight: 600;">Misafir</div>
        </div>

        <div class="card">
            <div class="balance-label">MEVCUT BAKİYE</div>
            <div class="balance-amount">
                <span id="ui-balance">0.0000</span>
                <div class="balance-unit">TON</div>
            </div>
            <div style="font-size: 12px; color: var(--success); font-weight: 600;">
                <i class="fas fa-chart-line"></i> Bugün +0.000 TON
            </div>
        </div>

        <div class="card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">Günlük Reklam Görevi</h3>
            <div class="progress-container">
                <div style="display:flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px;">
                    <span style="color: var(--dim)">İLERLEME</span>
                    <span id="ui-count">0 / 50</span>
                </div>
                <div class="progress-bar">
                    <div id="ui-progress" class="progress-fill"></div>
                </div>
            </div>
            <button id="ad-btn" class="btn" onclick="watchAd()">
                <i class="fas fa-play-circle"></i> REKLAM İZLE & KAZAN
            </button>
        </div>

        <!-- Admin Paneli (Sadece Adminlere) -->
        <div id="admin-section">
            <h3 style="color: var(--accent); margin-bottom: 15px;"><i class="fas fa-shield-halved"></i> Yönetici Paneli</h3>
            <button class="btn" style="background: #333;" onclick="tg.showPopup({message: 'Admin paneli yüklendi.'})">TALEPLERİ GÖR</button>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>ANA SAYFA</span></a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Referans sistemi yakında!')"><i class="fas fa-users"></i><span>EKİP</span></a>
        <a href="#" class="nav-item" onclick="handleWithdraw()"><i class="fas fa-wallet"></i><span>CÜZDAN</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        // DİKKAT: Deploy ettiğin server URL'sini buraya yaz!
        const SERVER_URL = "https://tonexa-backend.onrender.com"; 
        const ADMIN_ID = "123456789"; // Kendi ID'ni buraya yaz

        let state = {
            balance: 0.00,
            adsToday: 0,
            isLoaded: false
        };

        // Adsgram Init
        const AdController = window.Adsgram.init({ blockId: "4444" }); // Block ID'ni buraya koy

        async function syncData() {
            const user = tg.initDataUnsafe.user || { id: "demo", first_name: "Demo User" };
            document.getElementById('user-display').innerText = user.first_name;

            try {
                // Backend'e bağlanmayı dene
                const res = await fetch(`${SERVER_URL}/api/sync`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(user)
                });
                const data = await res.json();
                state.balance = data.balance;
                state.adsToday = data.adsToday;
                
                // Admin Kontrolü
                if (String(user.id) === ADMIN_ID) {
                    document.getElementById('admin-indicator').innerHTML = '<span class="admin-badge">ADMİN</span>';
                    document.getElementById('admin-section').style.display = 'block';
                }

            } catch (e) {
                console.log("Backend henüz aktif değil, demo modunda çalışıyor.");
            } finally {
                state.isLoaded = true;
                updateUI();
                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
                }, 1000);
            }
        }

        function updateUI() {
            document.getElementById('ui-balance').innerText = state.balance.toFixed(4);
            document.getElementById('ui-count').innerText = `${state.adsToday} / 50`;
            document.getElementById('ui-progress').style.width = `${(state.adsToday / 50) * 100}%`;
        }

        async function watchAd() {
            if (state.adsToday >= 50) return tg.showAlert("Günlük limitinize ulaştınız!");
            
            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> REKLAM YÜKLENİYOR...';

            try {
                const result = await AdController.show();
                if (result.done) {
                    // Backend'e ödül isteği gönder
                    const res = await fetch(`${SERVER_URL}/api/reward`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: tg.initDataUnsafe.user?.id || "demo" })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        state.balance = data.balance;
                        state.adsToday += 1;
                    } else {
                        // Demo fallback (Backend yoksa)
                        state.balance += 0.002;
                        state.adsToday += 1;
                    }
                    
                    updateUI();
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (err) {
                tg.showAlert("Reklam yüklenemedi veya kapandı.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play-circle"></i> REKLAM İZLE & KAZAN';
            }
        }

        function handleWithdraw() {
            if (state.balance < 0.1) {
                tg.showAlert("Minimum çekim 0.1 TON'dur.");
            } else {
                tg.showPopup({
                    title: 'Çekim Talebi',
                    message: `${state.balance.toFixed(4)} TON çekmek istiyor musunuz?`,
                    buttons: [{type: 'ok', text: 'Evet'}, {type: 'cancel', text: 'Hayır'}]
                });
            }
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            syncData();
        };
    </script>
</body>
</html>
