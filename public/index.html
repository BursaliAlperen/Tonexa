<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tonexa Pro</title>
    <!-- RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "988708",
            appId: "7279",
        });
    </script>
    <!-- Other SDKs -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #070B0F; --s: #12181F; --p: #0088CC; --acc: #00F2FE; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; }
        
        #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .spinner { width: 45px; height: 45px; border: 4px solid var(--s); border-top-color: var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 110px; }
        .card { background: var(--s); border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,136,204,0.05) 0%, transparent 100%); pointer-events: none; }

        .bal-label { font-size: 11px; color: #637381; font-weight: 800; letter-spacing: 1.5px; }
        .bal-val { font-size: 44px; font-weight: 800; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        
        .btn { background: var(--p); color: #fff; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.2s; box-shadow: 0 10px 25px rgba(0, 136, 204, 0.25); }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--s); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }

        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(18,24,31,0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; padding: 12px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #55606B; text-decoration: none; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; gap: 5px; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 20px; }

        #admin-panel { display: none; }
        .request-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 12px; border-left: 4px solid var(--p); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: 800; letter-spacing: 4px; color: var(--p);">TONEXA PRO</div>
    </div>

    <div class="container" id="view-main">
        <div class="card">
            <div class="bal-label">BAKİYE</div>
            <div class="bal-val" id="ui-bal">0.0000</div>
            <div style="font-size: 12px; font-weight: 600; color: var(--acc);">TON COIN <i class="fas fa-gem"></i></div>
        </div>

        <div class="stat-grid">
            <div class="stat-box">
                <div style="font-size: 10px; color:#637381;">DAVETLER</div>
                <div id="ui-refs" style="font-size: 18px; font-weight: 800;">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 10px; color:#637381;">GÖREVLER</div>
                <div id="ui-ads" style="font-size: 18px; font-weight: 800;">0 / 100</div>
            </div>
        </div>

        <div class="card">
            <button class="btn" id="ad-btn" onclick="playRewardedAd()">
                <i class="fas fa-play-circle"></i> ÖDÜLLÜ REKLAM
            </button>
            <p style="font-size: 10px; text-align: center; color: #55606B; margin-top: 12px;">+0.002 TON Her İzleme Başına</p>
        </div>

        <div id="admin-panel" class="card">
            <h3 style="color: gold; font-size: 14px;"><i class="fas fa-user-shield"></i> ADMİN PANELİ</h3>
            <div id="admin-list" style="max-height: 200px; overflow-y: auto;">Yükleniyor...</div>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i> ANA SAYFA</a>
        <a href="#" class="nav-item" onclick="copyRef()"><i class="fas fa-user-plus"></i> DAVET ET</a>
        <a href="#" class="nav-item" onclick="handleWithdraw()"><i class="fas fa-wallet"></i> CÜZDAN</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const SERVER_URL = "https://senin-app-url.onrender.com"; // DEPLOY SONRASI GÜNCELLE
        let state = null;

        async function init() {
            tg.expand();
            tg.ready();
            const user = tg.initDataUnsafe.user || { id: "6296765793", first_name: "Test" };
            
            try {
                const res = await fetch(`${SERVER_URL}/api/sync`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: user.id,
                        first_name: user.first_name,
                        username: user.username,
                        start_param: tg.initDataUnsafe.start_param
                    })
                });
                state = await res.json();
                render();
                if(state.role === 'admin') loadAdminData();
            } catch (e) {
                tg.showAlert("Sunucu bağlantı hatası!");
            } finally {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }
        }

        function render() {
            document.getElementById('ui-bal').innerText = state.balance.toFixed(4);
            document.getElementById('ui-refs').innerText = state.totalInvited || 0;
            document.getElementById('ui-ads').innerText = `${state.adsToday} / 100`;
            if(state.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
        }

        async function playRewardedAd() {
            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            
            // RichAds Rewarded Ad
            window.TelegramAdsController.playAd({
                type: 'rewarded',
                onCompleted: async () => {
                    const res = await fetch(`${SERVER_URL}/api/reward`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: state.uid, type: 'rewarded' })
                    });
                    const data = await res.json();
                    state.balance = data.balance;
                    state.adsToday += 1;
                    render();
                    tg.HapticFeedback.notificationOccurred('success');
                },
                onFailed: () => tg.showAlert("Reklam yüklenemedi."),
                onSkipped: () => tg.showAlert("Ödül için reklamı bitirmelisiniz.")
            });
            
            setTimeout(() => btn.disabled = false, 2000);
        }

        function copyRef() {
            const link = `https://t.me/TonexaAdsBot?start=${state.uid}`;
            // Standart kopyalama
            const input = document.createElement('input');
            input.value = link;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            tg.showAlert("Referans linkin kopyalandı!");
        }

        async function handleWithdraw() {
            const addr = prompt("TON Cüzdan Adresi:");
            if(!addr) return;
            const res = await fetch(`${SERVER_URL}/api/withdraw`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: state.uid, address: addr, amount: 0.1 })
            });
            if(res.ok) tg.showAlert("Çekim talebi oluşturuldu!");
            else tg.showAlert("Hata! Bakiye yetersiz veya tutar geçersiz.");
        }

        async function loadAdminData() {
            const res = await fetch(`${SERVER_URL}/api/admin/list?adminId=${state.uid}`);
            const data = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = data.length ? data.map(r => `
                <div class="request-item">
                    User: ${r.userId} <br> Mik: ${r.amount} TON <br> Adr: ${r.address}
                    <div style="margin-top:8px;">
                        <button onclick="adminAction('${r.id}', 'approved')">ONAY</button>
                        <button onclick="adminAction('${r.id}', 'rejected')">RED</button>
                    </div>
                </div>
            `).join('') : "Bekleyen talep yok.";
        }

        async function adminAction(requestId, status) {
            await fetch(`${SERVER_URL}/api/admin/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: state.uid, requestId, status })
            });
            loadAdminData();
        }

        window.onload = init;
    </script>
</body>
</html>
