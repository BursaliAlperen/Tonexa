<!DOCTYPE html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Referans Paneli</title><style>body{font-family:Arial;background:#0f1115;color:#fff;margin:0;padding:16px}.card{background:#191d26;border:1px solid #2c3340;border-radius:12px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{padding:10px;border-radius:10px;border:1px solid #2c3340;background:#2563eb;color:#fff;font-weight:700}.muted{color:#9ca3af;font-size:13px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #2c3340;text-align:left;font-size:13px}</style></head><body>
<div class='card'><h2>👥 Ref Arayüzü (Pro)</h2><p class='muted'>Ref gelirim, aktiflik, kayıt tarihi ve geçmiş filtreleri.</p><div class='grid'><div><b id='ref-count'>0</b><div class='muted'>Ref Sayısı</div></div><div><b id='ref-income'>0.000 TON</b><div class='muted'>Ref Gelirim</div></div><div><b id='ref-active'>0</b><div class='muted'>Aktif Ref</div></div></div></div>
<div class='card'><div class='grid'><button class='btn' data-range='1h'>1 Saat</button><button class='btn' data-range='1d'>1 Gün</button><button class='btn' data-range='1m'>1 Ay</button></div><div class='grid' style='margin-top:8px'><button class='btn' data-range='1y'>1 Yıl</button><button class='btn' data-range='all'>Tümü</button><button class='btn' id='copy-ref'>Ref Link Kopyala</button></div></div>
<div class='card'><h3>Referans Geçmişi</h3><table><thead><tr><th>Kullanıcı</th><th>Ödül</th><th>Aktiflik</th><th>Kayıt Tarihi</th></tr></thead><tbody id='history'></tbody></table></div>
<script>
const params=new URLSearchParams(location.search);const userId=params.get('userId')||'testuser';
async function load(range='all'){const r=await fetch(`/api/user/${userId}/referrals?range=${range}`);const d=await r.json();document.getElementById('ref-count').textContent=d.totalReferrals||0;document.getElementById('ref-income').textContent=`${Number(d.totalReward||0).toFixed(3)} TON`;document.getElementById('ref-active').textContent=(d.history||[]).filter(x=>x.active).length;const body=document.getElementById('history');body.innerHTML=(d.history||[]).map(h=>`<tr><td>${h.referredUserId||'-'}</td><td>${Number(h.reward||0).toFixed(3)} TON</td><td>${h.active?'Aktif':'Pasif'}</td><td>${new Date(h.date).toLocaleString('tr-TR')}</td></tr>`).join('')||'<tr><td colspan="4">Kayıt yok</td></tr>';}
document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>load(b.dataset.range));
document.getElementById('copy-ref').onclick=()=>{const l=`https://t.me/TonexaAdsBot?startapp=${userId}`;navigator.clipboard.writeText(l).then(()=>alert('Ref link kopyalandı'));};
load();
</script></body></html>
