<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clash Ton - Minimal</title>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Loader */
        #ad-loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { padding: 25px; height: 100%; display: flex; flex-direction: column; padding-bottom: 100px; }

        /* Stats */
        .header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .balance-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 36px; font-weight: 700; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-small { flex: 1; }
        .stat-small span { display: block; font-size: 10px; color: #666; }
        .stat-small b { font-size: 16px; }

        /* Main Area */
        .content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .btn-black { width: 100%; padding: 20px; background: var(--text); color: var(--bg); border: none; border-radius: 0px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-black:disabled { background: #333; color: #666; }
        .btn-outline { width: 100%; padding: 15px; background: transparent; color: var(--text); border: 1px solid var(--text); margin-top: 10px; font-weight: 600; cursor: pointer; }

        /* Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 0; outline: none; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px 0; }
        .nav-item { border: none; background: none; color: #444; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: var(--text); }
        .nav-item i { font-size: 18px; }

        .page { display: none; animation: fadeIn 0.2s; height: 100%; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="ad-loader"><div class="spinner"></div></div>

<div class="container">
    <div id="p-home" class="page active">
        <div class="header">
            <span class="balance-label">Mevcut Bakiye</span>
            <div class="balance-val" id="st-bal">0.0000</div>
            <span style="font-size: 12px; color: #444;">TON Coin</span>
        </div>

        <div class="stats-row">
            <div class="stat-small"><span>Limit</span><b id="st-ads">0/50</b></div>
            <div class="stat-small"><span>Referans</span><b id="st-refs">0</b></div>
        </div>

        <div class="content-area">
            <p style="font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6;">
                Reklam izleyerek bakiye biriktirin. Her reklam 0.005 TON değerindedir.
            </p>
            <button class="btn-black" id="btn-watch">REKLAMI BAŞLAT</button>
        </div>
    </div>

    <div id="p-withdraw" class="page">
        <div class="header"><h2>ÇEKİM TALEBİ</h2></div>

        <div class="input-group">
            <label>Cüzdan Adresi (TON)</label>
            <input type="text" id="wd-addr" placeholder="UQ...">
        </div>

        <div class="input-group">
            <label>Çekilecek Miktar (Min 0.5)</label>
            <input type="number" id="wd-amount" step="0.1" placeholder="0.5">
        </div>

        <div style="background:var(--card); padding: 15px; margin-bottom: 20px; font-size: 12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>Net Bakiye:</span><span id="wd-net-bal">0.0000 TON</span>
            </div>
            <div style="display:flex; justify-content:space-between; color:#666;">
                <span>İşlem Ücreti:</span><span>0.01 TON</span>
            </div>
        </div>

        <button class="btn-black" onclick="handleWithdraw()">TALEBİ GÖNDER</button>
    </div>

    <div id="p-ref" class="page">
        <div class="header"><h2>REFERANS</h2></div>
        <p style="font-size: 13px; color: #666; margin-bottom: 30px;">Davet ettiğiniz her kullanıcı için bakiye kazanırsınız.</p>

        <div style="background:var(--card); padding: 20px; border: 1px solid var(--border); margin-bottom: 20px;">
            <span class="balance-label">Toplam Ref Kazancı</span>
            <div style="font-size: 24px; font-weight: 700;" id="st-ref-earn">0.000</div>
        </div>

        <button class="btn-black" onclick="copyRef()">DAVET LİNKİNİ KOPYALA</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="nav('p-home', this)"><i class="fa-solid fa-play"></i><span>KAZAN</span></div>
    <div class="nav-item" onclick="nav('p-withdraw', this)"><i class="fa-solid fa-wallet"></i><span>CÜZDAN</span></div>
    <div class="nav-item" onclick="nav('p-ref', this)"><i class="fa-solid fa-users"></i><span>REF</span></div>
</nav>

<script>
    // ---------- Telegram Başlat ----------
    const tg = window.Telegram.WebApp;
    tg.ready(); // WebApp'in hazır olduğunu bildir
    tg.expand();

    // ---------- Firebase ----------
    const firebaseConfig = {
        apiKey: "AIzaSyDcL3C-C3rCxxZTebym9t8lL55EYKu3I5A",
        authDomain: "gen-lang-client-0766979962.firebaseapp.com",
        projectId: "gen-lang-client-0766979962",
        storageBucket: "gen-lang-client-0766979962.firebasestorage.app",
        messagingSenderId: "327892498777",
        appId: "1:327892498777:web:49ce0bab8267562f033448"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Kullanıcı ID’si (Telegram ID yoksa test için dev_user)
    let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_user";
    let state = { balance: 0, todayAds: 0, refs: 0, refEarn: 0 };

    // ---------- RichAds ----------
    const ads = new TelegramAdsController();
    ads.initialize({ pubId: "988708", appId: "7273", debug: true }); // debug açık, sorunları konsolda gör

    let adsReady = false;

    // Reklam havuzu hazır olduğunda butonu aktifleştir
    ads.onReady(() => {
        adsReady = true;
        updateUI();
    });

    // ---------- Veritabanı ve UI ----------
    async function init() {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) state = doc.data();
        else await db.collection('users').doc(uid).set(state);
        updateUI();
    }

    function updateUI() {
        document.getElementById('st-bal').innerText = state.balance.toFixed(4);
        document.getElementById('wd-net-bal').innerText = state.balance.toFixed(4) + " TON";
        document.getElementById('st-ads').innerText = state.todayAds + "/50";
        document.getElementById('st-refs').innerText = state.refs || 0;
        document.getElementById('st-ref-earn').innerText = (state.refEarn || 0).toFixed(4);

        const btn = document.getElementById('btn-watch');
        if (!adsReady) {
            btn.disabled = true;
            btn.innerText = "REKLAM YÜKLENİYOR…";
        } else if (state.todayAds >= 50) {
            btn.disabled = true;
            btn.innerText = "GÜNLÜK LİMİT DOLDU";
        } else {
            btn.disabled = false;
            btn.innerText = "REKLAMI BAŞLAT";
        }
    }

    // ---------- Reklam İzleme ----------
    document.getElementById('btn-watch').onclick = async function () {
        if (!adsReady) {
            tg.showAlert("Reklam henüz yüklenmedi, lütfen biraz bekleyin.");
            return;
        }
        if (state.todayAds >= 50) {
            tg.showAlert("Bugünlük reklam hakkınız doldu.");
            return;
        }

        document.getElementById('ad-loader').style.display = 'flex';
        try {
            // Interstitial video göster
            await ads.triggerInterstitialVideo();
            // Başarıyla izlendi, ödül ver
            state.balance += 0.005;
            state.todayAds += 1;
            await db.collection('users').doc(uid).update(state);
            updateUI();
        } catch (e) {
            console.error("Reklam hatası:", e);
            tg.showAlert("Reklam şu an hazır değil. Lütfen tekrar deneyin.");
        } finally {
            document.getElementById('ad-loader').style.display = 'none';
        }
    };

    // ---------- Çekim ----------
    function handleWithdraw() {
        const addr = document.getElementById('wd-addr').value.trim();
        const amount = parseFloat(document.getElementById('wd-amount').value);

        if (!addr || addr.length < 10) return tg.showAlert("Geçerli bir TON adresi girin.");
        if (isNaN(amount) || amount < 0.5) return tg.showAlert("Minimum çekim 0.5 TON.");
        if (amount > state.balance) return tg.showAlert("Yetersiz bakiye.");

        db.collection('withdrawals').add({
            uid, addr, amount, date: new Date(), status: 'pending'
        }).then(() => {
            tg.showPopup({ message: "Çekim talebiniz işleme alındı." });
        });
    }

    // ---------- Gezinti ----------
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // ---------- Referans ----------
    function copyRef() {
        const link = "https://t.me/ClashTonAdsBot?start=" + uid;
        navigator.clipboard.writeText(link);
        tg.showAlert("Link kopyalandı.");
    }

    // ---------- Başlat ----------
    window.onload = init;
</script>

</body>
</html>
