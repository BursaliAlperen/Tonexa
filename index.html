<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeoBeast Watcher Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        window.richadsController = null;
        if (typeof window.TelegramAdsController !== 'undefined') {
            window.richadsController = new window.TelegramAdsController();
            window.richadsController.initialize({ pubId: "988708", appId: "7267", debug: false });
        }
    </script>

    <style>
        :root {
            --primary: #00E5FF; /* Parlak Cyan */
            --secondary: #FF2D55; /* Canlı Pembe */
            --bg: #08080c;
            --card: rgba(20, 20, 25, 0.8);
            --border: #1a1a22;
            --black-edge: 3px solid #000; /* İstediğin siyah çerçeve stili */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, transparent 70%);
        }

        #app { padding: 20px 16px 100px; height: 100vh; overflow-y: auto; }

        /* Dashboard Kartı */
        .main-card {
            background: var(--card);
            border: var(--black-edge);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 0 #000; /* 3D derinlik */
            margin-bottom: 20px;
            position: relative;
        }

        .balance-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .balance-val { font-size: 48px; font-weight: 800; margin: 5px 0; color: var(--primary); text-shadow: 2px 2px 0 #000; }
        
        .daily-progress {
            background: #000;
            height: 14px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid #333;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #00AEEF);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Watch Butonu - Ultra Kawaii & 3D */
        .watch-btn {
            background: var(--secondary);
            border: 4px solid #000;
            padding: 22px;
            border-radius: 22px;
            color: #fff;
            font-weight: 900;
            font-size: 20px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 0 #000;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .watch-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }
        .watch-btn i { font-size: 28px; filter: drop-shadow(2px 2px 0 #000); }

        /* Alt İstatistikler */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item {
            background: var(--card);
            border: 2px solid #000;
            padding: 15px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 5px 0 #000;
        }
        .stat-item .label { font-size: 10px; color: #aaa; display: block; }
        .stat-item .val { font-size: 18px; font-weight: 700; color: #fff; }

        /* Loader */
        #ad-loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; display: none; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .spinner {
            width: 60px; height: 60px; border: 6px solid #111;
            border-top: 6px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Navigasyon */
        .nav {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: #111; border: 3px solid #000; border-radius: 25px;
            display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px;
            box-shadow: 0 8px 0 #000;
        }
        .nav-item { text-align: center; color: #555; font-size: 10px; text-decoration: none; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="ad-loader">
    <div class="spinner"></div>
    <div id="loader-status" style="font-weight: 600; letter-spacing: 1px;">HAZIRLANIYOR...</div>
</div>

<div id="app">
    <div class="main-card">
        <div class="balance-label">Toplam Kazanç</div>
        <div class="balance-val" id="ton-bal">0.0000</div>
        <div style="color: var(--primary); font-weight: 800; font-size: 14px;">TON COIN</div>

        <div class="daily-progress">
            <div class="progress-fill" id="p-bar"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#666; font-weight:700;">
            <span>GÜNLÜK HEDEF</span>
            <span id="ad-count-text">0 / 50</span>
        </div>

        <button class="watch-btn" onclick="handleWatch()">
            <i class="fas fa-play-circle"></i>
            REKLAM İZLE
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="label">TASK PUANI</span>
            <span class="val" id="task-bal">0.00</span>
        </div>
        <div class="stat-item">
            <span class="label">MULTIPLIER</span>
            <span class="val">x1.5</span>
        </div>
    </div>

    <div id="task-list"></div>
</div>

<nav class="nav">
    <a href="#" class="nav-item active"><i class="fas fa-bolt"></i>KAZAN</a>
    <a href="#" class="nav-item"><i class="fas fa-wallet"></i>CÜZDAN</a>
    <a href="#" class="nav-item"><i class="fas fa-users"></i>EKİP</a>
    <a href="#" class="nav-item"><i class="fas fa-cog"></i>AYAR</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const uid = tg.initDataUnsafe?.user?.id || "demo_user";
    
    let state = {
        ton: 0,
        task: 0,
        count: 0,
        limit: 50
    };

    // REKLAM MOTORU (FALLBACK)
    async function tryAd(type) {
        try {
            if (type === 'video') return await window.richadsController.triggerInterstitialVideo();
            if (type === 'static') return await window.richadsController.triggerInterstitialBanner();
            return false;
        } catch (e) { return false; }
    }

    async function handleWatch() {
        if (state.count >= state.limit) return tg.showAlert("Bugünlük limit doldu!");

        const loader = document.getElementById('ad-loader');
        const status = document.getElementById('loader-status');
        loader.style.display = 'flex';
        
        let success = false;

        // 1. DENE: VİDEO (En yüksek kazanç)
        status.innerText = "VİDEO YÜKLENİYOR...";
        success = await tryAd('video');

        // 2. DENE: STATİK (Eğer video yoksa - %100 Garanti adımı)
        if (!success) {
            status.innerText = "ALTERNATİF ARANIYOR...";
            await new Promise(r => setTimeout(r, 1000));
            success = await tryAd('static');
        }

        if (success) {
            // Ödül İşlemi (API Bağlantın varsa buraya fetch eklersin)
            state.ton += 0.002;
            state.task += 0.05;
            state.count += 1;
            render();
            tg.showScanQrPopup({ text: "Ödül Hesabına Eklendi! 🎉" }); // Opsiyonel şık bir bildirim
            setTimeout(() => tg.closeScanQrPopup(), 1500);
        } else {
            tg.showAlert("Şu an reklam havuzu boş, 30sn sonra tekrar dene!");
        }

        loader.style.display = 'none';
    }

    function render() {
        document.getElementById('ton-bal').innerText = state.ton.toFixed(4);
        document.getElementById('task-bal').innerText = state.task.toFixed(2);
        document.getElementById('ad-count-text').innerText = `${state.count} / ${state.limit}`;
        
        const percent = (state.count / state.limit) * 100;
        document.getElementById('p-bar').style.width = percent + '%';
    }

    // İlk yükleme
    window.onload = () => {
        // API'den veri çekme simülasyonu
        render();
    };
</script>
</body>
</html>
