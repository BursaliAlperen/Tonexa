<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ClashTonAds - Fixed</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.richAdsController = new TelegramAdsController();
        window.richAdsController.initialize({ pubId: "988708", appId: "7273", debug: false });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        :root { --kawaii-pink: #FF7EB9; --kawaii-blue: #70D6FF; --kawaii-yellow: #FFD60A; --black: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Fredoka', sans-serif; margin: 0; padding: 20px 15px 100px 15px; background-color: #121212; color: var(--black); }

        .pro-card { background: white; border: 3px solid var(--black); box-shadow: 5px 5px 0px var(--black); border-radius: 18px; padding: 20px; margin-bottom: 20px; }
        .btn-watch { width: 100%; padding: 20px; background: var(--kawaii-yellow); border: 3px solid var(--black); box-shadow: 5px 5px 0px var(--black); border-radius: 18px; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-watch:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--black); }

        #loader { position: fixed; inset: 0; background: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; display: grid; grid-template-columns: repeat(4, 1fr); background: white; border: 3px solid var(--black); border-radius: 20px; box-shadow: 5px 5px 0px var(--black); padding: 10px; }
        .nav-item { border: none; background: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 style="color:var(--kawaii-pink)">CLASH TON</h1>
        <div id="load-text">Connecting to Database...</div>
        <button id="bypass-btn" style="display:none; margin-top:20px; padding:10px; border-radius:10px; border:none; background:var(--kawaii-blue);">Open Anyway (Offline)</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="pro-card" style="background: var(--kawaii-pink); color: white; text-align: center;">
            <h3 style="margin:0; font-size:14px;">My Balance</h3>
            <div style="font-size:36px; font-weight:800;" id="balance">0.000 TON</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div class="pro-card" style="margin-bottom:0; background: var(--kawaii-blue); text-align: center;">
                <div style="font-size:24px; font-weight:800;" id="today-count">0/50</div>
                <div style="font-size:12px; font-weight:600;">Daily Ads</div>
            </div>
            <div class="pro-card" style="margin-bottom:0; background: var(--kawaii-yellow); text-align: center;">
                <div style="font-size:24px; font-weight:800;" id="ref-count">0</div>
                <div style="font-size:12px; font-weight:600;">Referrals</div>
            </div>
        </div>

        <button class="btn-watch" id="watchBtn">WATCH AD & EARN</button>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyDcL3C-C3rCxxZTebym9t8lL55EYKu3I5A",
            authDomain: "gen-lang-client-0766979962.firebaseapp.com",
            projectId: "gen-lang-client-0766979962",
            storageBucket: "gen-lang-client-0766979962.firebasestorage.app",
            messagingSenderId: "327892498777",
            appId: "1:327892498777:web:49ce0bab8267562f033448"
        };

        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        
        let userId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_user";
        let userState = { balance: 0, totalAds: 0, todayAds: 0, refs: 0 };

        // --- TAKILMAYI ÖNLEYEN INIT ---
        async function initUser() {
            try {
                // 5 saniye içinde cevap gelmezse offline devam et
                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 5000));
                const userRef = db.collection('users').doc(userId);
                
                const doc = await Promise.race([userRef.get(), timeout]);
                
                if (doc && doc.exists()) {
                    userState = doc.data();
                } else {
                    await userRef.set(userState);
                }
            } catch (err) {
                console.warn("Firestore not reachable, using local/default state.");
                document.getElementById('bypass-btn').style.display = 'block';
                // Eğer hata verirse yine de uygulamayı aç
            }
            startApp();
        }

        function startApp() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').textContent = (userState.balance || 0).toFixed(3) + " TON";
            document.getElementById('today-count').textContent = (userState.todayAds || 0) + "/50";
            document.getElementById('ref-count').textContent = userState.refs || 0;
        }

        async function handleWatchAd() {
            const btn = document.getElementById('watchBtn');
            btn.disabled = true;
            try {
                await window.richAdsController.triggerInterstitialVideo();
                
                userState.balance += 0.005;
                userState.todayAds += 1;

                updateUI();
                
                // Firestore'a kaydet (Hata alsa bile arayüz güncellendi)
                db.collection('users').doc(userId).set(userState, {merge: true}).catch(e => console.log("Save failed"));
                db.collection('watchads').add({ uid: userId, timestamp: new Date() }).catch(e => {});

                tg.showPopup({ message: "Success! +0.005 TON" });
            } catch (err) {
                tg.showAlert("Ad failed to load.");
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('bypass-btn').onclick = startApp;
        document.getElementById('watchBtn').onclick = handleWatchAd;

        window.onload = initUser;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
