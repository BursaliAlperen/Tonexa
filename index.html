<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ClashTonAds - Pro Kawaii</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.richAdsController = new TelegramAdsController();
        window.richAdsController.initialize({ pubId: "988708", appId: "7273", debug: false });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        :root {
            --pink: #FF7EB9; --blue: #70D6FF; --yellow: #FFD60A; --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0; padding: 20px 15px 110px 15px;
            background-color: #121212; color: var(--black);
            overscroll-behavior-y: contain;
        }

        /* Kawaii Pro Style with Thick Black Borders */
        .card-pro {
            background: white; border: 4px solid var(--black);
            box-shadow: 6px 6px 0px var(--black);
            border-radius: 20px; padding: 20px; margin-bottom: 22px;
        }

        .btn-main {
            width: 100%; padding: 22px; background: var(--yellow);
            border: 4px solid var(--black); box-shadow: 6px 6px 0px var(--black);
            border-radius: 20px; font-size: 22px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.1s;
        }
        .btn-main:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--black); }
        .btn-main:disabled { background: #bbb; cursor: not-allowed; transform: none; box-shadow: 6px 6px 0px var(--black); }

        #loading-screen {
            position: fixed; inset: 0; background: #121212; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            background: white; border: 4px solid var(--black);
            border-radius: 25px; box-shadow: 6px 6px 0px var(--black);
            padding: 12px; z-index: 100;
        }
        .nav-btn { border: none; background: none; font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--pink); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color:var(--pink); font-size: 36px; margin-bottom: 5px;">CLASH TON</h1>
        <p id="load-status">Connecting to Firestore...</p>
        <div style="width: 40px; height: 40px; border: 4px solid var(--pink); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="card-pro" style="background: var(--pink); color: white; text-align: center;">
            <p style="margin:0; font-weight: 600; text-transform: uppercase; font-size: 13px;">Wallet Balance</p>
            <div style="font-size: 40px; font-weight: 800; margin: 5px 0;" id="txt-balance">0.000 TON</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 22px;">
            <div class="card-pro" style="margin-bottom:0; background: var(--blue); text-align: center; padding: 15px;">
                <div style="font-size: 26px; font-weight: 800;" id="txt-daily">0/50</div>
                <div style="font-size: 12px; font-weight: 600;">Daily Ads</div>
            </div>
            <div class="card-pro" style="margin-bottom:0; background: var(--yellow); text-align: center; padding: 15px;">
                <div style="font-size: 26px; font-weight: 800;" id="txt-refs">0</div>
                <div style="font-size: 12px; font-weight: 600;">Referrals</div>
            </div>
        </div>

        <button class="btn-main" id="btn-watch">
            <i class="fa-solid fa-play-circle"></i> WATCH AD & EARN
        </button>

        <div class="card-pro" style="margin-top:20px; height: 180px; padding: 10px;">
            <canvas id="chart-activity"></canvas>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active"><i class="fa-solid fa-house"></i><span>Home</span></button>
        <button class="nav-btn"><i class="fa-solid fa-wallet"></i><span>Cash</span></button>
        <button class="nav-btn"><i class="fa-solid fa-history"></i><span>Logs</span></button>
        <button class="nav-btn"><i class="fa-solid fa-user-friends"></i><span>Invite</span></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDcL3C-C3rCxxZTebym9t8lL55EYKu3I5A",
            authDomain: "gen-lang-client-0766979962.firebaseapp.com",
            projectId: "gen-lang-client-0766979962",
            storageBucket: "gen-lang-client-0766979962.firebasestorage.app",
            messagingSenderId: "327892498777",
            appId: "1:327892498777:web:49ce0bab8267562f033448"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        
        let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_mode_user";
        let state = { balance: 0, totalAds: 0, todayAds: 0, refs: 0 };

        // --- SAFE INITIALIZATION ---
        async function startSystem() {
            const loadStatus = document.getElementById('load-status');
            
            try {
                // Zaman aşımı: 4 saniye içinde Firestore cevap vermezse devam et
                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 4000));
                const userDoc = await Promise.race([db.collection('users').doc(uid).get(), timeout]);

                if (userDoc && userDoc.exists()) {
                    state = userDoc.data();
                } else {
                    await db.collection('users').doc(uid).set(state);
                }
                loadStatus.textContent = "Data Synced!";
            } catch (e) {
                console.error("Firestore error or timeout:", e);
                loadStatus.textContent = "Offline Mode Active";
            }

            // Uygulamayı her ne olursa olsun aç
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                renderUI();
            }, 500);
        }

        function renderUI() {
            document.getElementById('txt-balance').textContent = (state.balance || 0).toFixed(3) + " TON";
            document.getElementById('txt-daily').textContent = (state.todayAds || 0) + "/50";
            document.getElementById('txt-refs').textContent = state.refs || 0;
            
            const btn = document.getElementById('btn-watch');
            if(state.todayAds >= 50) {
                btn.disabled = true;
                btn.textContent = "DAILY LIMIT REACHED";
            }
        }

        async function watchAdAction() {
            const btn = document.getElementById('btn-watch');
            btn.disabled = true;

            try {
                // Gerçek Reklam Tetikleme
                await window.richAdsController.triggerInterstitialVideo();
                
                // Ödül Hesaplama
                state.balance += 0.005;
                state.totalAds += 1;
                state.todayAds += 1;

                // Firestore Güncelleme (Arka planda)
                db.collection('users').doc(uid).update(state).catch(() => {});
                db.collection('watchads').add({
                    userId: uid,
                    amount: 0.005,
                    date: new Date().toISOString()
                }).catch(() => {});

                renderUI();
                tg.showPopup({ message: "Nice! +0.005 TON earned." });
            } catch (err) {
                tg.showAlert("Ad could not be loaded or was closed early.");
            } finally {
                btn.disabled = false;
            }
        }

        // --- INIT ---
        window.onload = () => {
            startSystem();
            document.getElementById('btn-watch').addEventListener('click', watchAdAction);
            
            // Chart setup
            const ctx = document.getElementById('chart-activity').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
                    datasets: [{
                        data: [5, 10, 15, 8, 20, 12, state.todayAds],
                        backgroundColor: '#FF7EB9',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false } } }
            });
        };

        tg.ready();
        tg.expand();
    </script>

    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
