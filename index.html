<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TonexaAds</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome Pro Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #03050b;
            --surface: rgba(255,255,255,0.02);
            --border: rgba(255,255,255,0.04);
            --text: #f2f2f7;
            --text-dim: #7b7b9e;
            --accent: #b794f4;
            --accent2: #6b46c1;
            --success: #10b981;
            --error: #ef4444;
            --radius: 32px;
            --radius-sm: 22px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .bg-orb {
            position: fixed; width: 350px; height: 350px;
            border-radius: 50%; filter: blur(120px); opacity: 0.12;
            pointer-events: none; z-index: 0;
        }
        .bg-orb.top { top: -150px; right: -150px; background: #8b5cf6; }
        .bg-orb.bottom { bottom: -150px; left: -150px; background: #7c3aed; }

        .loader-overlay {
            position: fixed; inset:0; background: rgba(3,5,11,0.9);
            backdrop-filter: blur(20px); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 24px;
        }
        .loader-spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 15px; color: var(--text-dim); font-weight: 500; }

        .toast {
            position: fixed; top: 28px; left: 50%; transform: translateX(-50%) translateY(-30px);
            background: rgba(15,15,30,0.95); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 16px 32px; border-radius: 50px; font-weight: 600;
            font-size: 15px; z-index: 9999; opacity: 0;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none; box-shadow: 0 20px 50px -15px rgba(0,0,0,0.6);
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--error); }

        .container { flex:1; overflow-y:auto; padding:20px 20px 110px; position:relative; z-index:1; }
        .card {
            background: var(--surface); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 32px 28px; margin-bottom: 24px;
        }
        .balance-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; font-weight: 600; }
        .balance-amount {
            font-size: 56px; font-weight: 800; line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 8px 0 8px;
        }
        .balance-unit { font-size: 16px; color: var(--text-dim); letter-spacing: 2px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
        .stat-card {
            background: var(--surface); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 22px 18px; text-align: center;
        }
        .stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card .value {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .chart-box { margin: 20px 0 28px; padding: 20px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        canvas { width: 100% !important; height: auto !important; max-height: 240px; }
        .info-text { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-bottom: 28px; text-align: center; }

        .btn {
            width: 100%; padding: 20px; border: none; border-radius: var(--radius-sm);
            font-weight: 700; font-size: 17px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            color: white; box-shadow: 0 15px 35px rgba(124,58,237,0.35);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.2);
            box-shadow: none; cursor: not-allowed;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            font-size: 13px; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px; display: block; font-weight: 600;
        }
        .input-group input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: white; font-size: 16px; outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }

        .nav {
            background: rgba(3,5,11,0.8); backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(3, 1fr);
            padding: 16px 0 26px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        }
        .nav-item {
            border: none; background: none; color: var(--text-dim);
            font-size: 11px; display: flex; flex-direction: column;
            align-items: center; gap: 10px; font-weight: 600;
            text-transform: uppercase; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; }

        .page { display: none; animation: fadeSlide 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-orb top"></div>
<div class="bg-orb bottom"></div>

<div class="loader-overlay" id="ad-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Video reklam aranıyor…</div>
</div>
<div class="toast" id="toast"></div>

<div class="container">
    <!-- ANA SAYFA -->
    <div id="p-home" class="page active">
        <div class="card" style="text-align:center;">
            <div class="balance-label"><i class="fa-solid fa-coins" style="margin-right:8px;"></i> Mevcut Bakiye</div>
            <div class="balance-amount" id="st-bal">0.0000</div>
            <div class="balance-unit">TON COIN</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="label"><i class="fa-solid fa-clock" style="margin-right:6px;"></i>Bugün</div>
                <div class="value" id="st-ads">0/50</div>
            </div>
            <div class="stat-card">
                <div class="label"><i class="fa-solid fa-user-group" style="margin-right:6px;"></i>Referans</div>
                <div class="value" id="st-refs">0</div>
            </div>
        </div>

        <div class="chart-box">
            <div style="font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:14px;">
                <i class="fa-solid fa-chart-simple" style="margin-right:6px;"></i> Bu Hafta (TON)
            </div>
            <canvas id="chart-weekly"></canvas>
        </div>

        <p class="info-text">
            <i class="fa-solid fa-circle-play" style="color:var(--accent); margin-right:6px;"></i>
            Video izle, <strong style="color:var(--accent);">0.005 TON</strong> kazan.
        </p>

        <button class="btn btn-primary" id="btn-watch">
            <i class="fa-solid fa-play" style="margin-right:10px;"></i>
            Reklam İzle
        </button>
    </div>

    <!-- ÇEKİM -->
    <div id="p-withdraw" class="page">
        <div class="card">
            <h3 style="margin-bottom:28px; font-weight:700;"><i class="fa-solid fa-wallet" style="margin-right:8px;"></i>Çekim Talebi</h3>
            <div class="input-group">
                <label><i class="fa-solid fa-link" style="margin-right:6px;"></i>Cüzdan Adresi</label>
                <input type="text" id="wd-addr" placeholder="UQ…">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-coins" style="margin-right:6px;"></i>Miktar (Min. 0.5)</label>
                <input type="number" id="wd-amount" step="0.1" placeholder="0.5">
            </div>
            <div style="display:flex; justify-content:space-between; margin:24px 0; color:var(--text-dim);">
                <span>Net Bakiye</span>
                <span id="wd-net-bal" style="color:white; font-weight:600;">0.0000 TON</span>
            </div>
            <button class="btn btn-primary" onclick="handleWithdraw()">
                <i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i>
                Talebi Gönder
            </button>
        </div>
    </div>

    <!-- REFERANS -->
    <div id="p-ref" class="page">
        <div class="card">
            <h3 style="margin-bottom:28px;"><i class="fa-solid fa-users" style="margin-right:8px;"></i>Arkadaşlarını Davet Et</h3>
            <p style="color:var(--text-dim); margin-bottom:28px; line-height:1.6;">Davet ettiğin her kullanıcı kazandığında sen de kazan.</p>
            <div class="balance-label"><i class="fa-solid fa-gift" style="margin-right:6px;"></i>Toplam Ref Kazancı</div>
            <div class="balance-amount" style="font-size:40px;" id="st-ref-earn">0.0000</div>
            <div class="balance-unit" style="margin-bottom:28px;">TON</div>
            <button class="btn btn-primary" onclick="copyRef()">
                <i class="fa-solid fa-copy" style="margin-right:10px;"></i>
                Linki Kopyala
            </button>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchTab('p-home', this)">
        <i class="fa-solid fa-house"></i><span>Kazan</span>
    </div>
    <div class="nav-item" onclick="switchTab('p-withdraw', this)">
        <i class="fa-solid fa-wallet"></i><span>Cüzdan</span>
    </div>
    <div class="nav-item" onclick="switchTab('p-ref', this)">
        <i class="fa-solid fa-user-plus"></i><span>Ref</span>
    </div>
</nav>

<script>
    // Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Kullanıcı kimliği
    let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_user";
    const DAILY_LIMIT = 50;
    const REWARD = 0.005;

    // Varsayılan durum
    const DEFAULT_STATE = {
        balance: 0,
        todayAds: 0,
        refs: 0,
        refEarn: 0,
        dailyEarnings: { mon:0, tue:0, wed:0, thu:0, fri:0, sat:0, sun:0 }
    };

    function loadState() {
        const saved = localStorage.getItem(`tonexa_${uid}`);
        return saved ? JSON.parse(saved) : { ...DEFAULT_STATE };
    }
    function saveState(s) { localStorage.setItem(`tonexa_${uid}`, JSON.stringify(s)); }

    let state = loadState();

    // RichAds Controller'ı başlat
    const richadsController = new window.TelegramAdsController();
    richadsController.initialize({
        pubId: "988708",
        appId: "7273",
        debug: false
    });

    let adInProgress = false;
    let weeklyChart = null;

    function getDayKey() {
        const keys = ['sun','mon','tue','wed','thu','fri','sat'];
        return keys[new Date().getDay()];
    }

    function addDaily(amt) {
        const key = getDayKey();
        state.dailyEarnings[key] = (state.dailyEarnings[key] || 0) + amt;
        saveState(state);
        updateChart();
    }

    function giveReward() {
        if (state.todayAds >= DAILY_LIMIT) return;
        state.balance += REWARD;
        state.todayAds += 1;
        addDaily(REWARD);
        saveState(state);
        updateUI();
        showToast(`🎉 +${REWARD.toFixed(3)} TON eklendi!`, 'success');
    }

    function cleanup() {
        document.getElementById('ad-loader').style.display = 'none';
        adInProgress = false;
    }

    // Reklamı başlat (buton tıklaması)
    async function startVideoAd() {
        if (adInProgress) return;
        if (state.todayAds >= DAILY_LIMIT) {
            showToast("Günlük limit doldu.", "error");
            return;
        }

        adInProgress = true;
        document.getElementById('ad-loader').style.display = 'flex';
        const msg = document.querySelector('.loader-text');

        // 3 kez dene
        for (let i = 0; i < 3; i++) {
            msg.innerText = i === 0 ? 'Video reklam aranıyor…' : `Tekrar deneniyor (${i+1}/3)…`;
            if (i > 0) await new Promise(r => setTimeout(r, 1500));

            try {
                await richadsController.triggerInterstitialVideo();
                // Reklam başarıyla izlendi ve kapandı, ödülü ver
                giveReward();
                cleanup();
                return;
            } catch (err) {
                // Bu denemede reklam gösterilemedi, döngü devam
                continue;
            }
        }

        // Hiçbir deneme başarılı olmadı
        showToast("Reklam şu an mevcut değil. Lütfen daha sonra tekrar dene.", "error");
        cleanup();
    }

    document.getElementById('btn-watch').addEventListener('click', startVideoAd);

    // Sayfa değiştirme (sadece gezinme, reklam yok)
    function switchTab(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
        if (pageId === 'p-home') updateChart();
    }

    // Grafik güncelleme
    function updateChart() {
        const ctx = document.getElementById('chart-weekly')?.getContext('2d');
        if (!ctx) return;
        const e = state.dailyEarnings;
        const data = [e.mon||0, e.tue||0, e.wed||0, e.thu||0, e.fri||0, e.sat||0, e.sun||0];
        if (weeklyChart) {
            weeklyChart.data.datasets[0].data = data;
            weeklyChart.update();
        } else {
            weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'],
                    datasets: [{
                        label: 'TON',
                        data,
                        backgroundColor: 'rgba(167,139,250,0.5)',
                        borderColor: '#b794f4',
                        borderWidth: 1.5,
                        borderRadius: 10,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color:'#7b7b9e', callback:v=>v.toFixed(3) }, grid: { color:'rgba(255,255,255,0.04)' } },
                        x: { ticks: { color:'#7b7b9e' }, grid: { display: false } }
                    }
                }
            });
        }
    }

    // Arayüz güncelleme
    function updateUI() {
        document.getElementById('st-bal').innerText = state.balance.toFixed(4);
        document.getElementById('wd-net-bal').innerText = state.balance.toFixed(4) + ' TON';
        document.getElementById('st-ads').innerText = state.todayAds + '/' + DAILY_LIMIT;
        document.getElementById('st-refs').innerText = state.refs || 0;
        document.getElementById('st-ref-earn').innerText = (state.refEarn || 0).toFixed(4);

        const btn = document.getElementById('btn-watch');
        btn.disabled = state.todayAds >= DAILY_LIMIT;
        btn.innerHTML = state.todayAds >= DAILY_LIMIT
            ? '<i class="fa-solid fa-check-circle" style="margin-right:10px;"></i> Limit Doldu'
            : '<i class="fa-solid fa-play" style="margin-right:10px;"></i> Reklam İzle';
    }

    // Toast mesajı
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} visible`;
        setTimeout(() => t.classList.remove('visible'), 2500);
    }

    // Çekim talebi
    function handleWithdraw() {
        const addr = document.getElementById('wd-addr').value.trim();
        const amt = parseFloat(document.getElementById('wd-amount').value);
        if (!addr || addr.length < 10) return showToast('Geçerli TON adresi girin.', 'error');
        if (isNaN(amt) || amt < 0.5) return showToast('Minimum 0.5 TON.', 'error');
        if (amt > state.balance) return showToast('Yetersiz bakiye.', 'error');

        let withdrawals = JSON.parse(localStorage.getItem(`tonexa_wd_${uid}`) || '[]');
        withdrawals.push({ uid, addr, amount: amt, date: new Date().toISOString(), status: 'pending' });
        localStorage.setItem(`tonexa_wd_${uid}`, JSON.stringify(withdrawals));
        showToast('✅ Talebiniz alındı.', 'success');
        document.getElementById('wd-addr').value = '';
        document.getElementById('wd-amount').value = '';
    }

    // Referans linki kopyala
    function copyRef() {
        navigator.clipboard.writeText(`https://t.me/TonexaAdsBot?start=${uid}`);
        showToast('📋 Davet linki kopyalandı.', 'success');
    }

    // Başlangıç
    updateUI();
    updateChart();
</script>
</body>
</html>
