<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ClashTon - Çalışan Reklam</title>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6f8; color: #1e293b; height:100vh; display:flex; flex-direction:column; overflow:hidden;
        }
        .loader-overlay {
            position:fixed; inset:0; background:rgba(255,255,255,0.9);
            display:none; align-items:center; justify-content:center; z-index:9999;
        }
        .spinner {
            width:36px; height:36px; border:3px solid #e2e8f0;
            border-top-color:#6366f1; border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:white; color:#1e293b; padding:14px 24px; border-radius:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1); font-weight:600; font-size:14px;
            z-index:9998; opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .toast.success { border-left:4px solid #10b981; }
        .toast.error { border-left:4px solid #ef4444; }
        .toast.visible { opacity:1; }
        .container { flex:1; overflow-y:auto; padding:20px 20px 90px; }
        .card {
            background:white; border-radius:20px; padding:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.03); margin-bottom:20px;
        }
        .balance-label { font-size:13px; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
        .balance-amount { font-size:36px; font-weight:800; color:#6366f1; margin:8px 0; }
        .stats { display:flex; gap:15px; margin-bottom:20px; }
        .stat-box {
            flex:1; background:white; border-radius:16px; padding:16px;
            box-shadow:0 4px 15px rgba(0,0,0,0.03); text-align:center;
        }
        .stat-box span { display:block; font-size:11px; color:#64748b; margin-bottom:6px; }
        .stat-box b { font-size:18px; }
        .btn {
            width:100%; padding:18px; border:none; border-radius:16px;
            font-weight:700; font-size:16px; text-transform:uppercase; letter-spacing:0.5px;
            cursor:pointer; transition:0.2s;
        }
        .btn-primary { background:#6366f1; color:white; box-shadow:0 8px 18px rgba(99,102,241,0.3); }
        .btn-primary:active { transform:scale(0.98); }
        .btn-primary:disabled { background:#cbd5e1; color:#94a3b8; box-shadow:none; cursor:not-allowed; }
        .info-text { font-size:14px; color:#475569; margin-bottom:18px; line-height:1.6; }
        .nav {
            background:white; border-top:1px solid #f1f5f9;
            display:grid; grid-template-columns:repeat(3,1fr); padding:12px 0;
            position:fixed; bottom:0; left:0; right:0;
        }
        .nav-item {
            border:none; background:none; color:#94a3b8;
            font-size:10px; display:flex; flex-direction:column; align-items:center; gap:4px;
            font-weight:600; text-transform:uppercase;
        }
        .nav-item.active { color:#6366f1; }
        .nav-item i { font-size:18px; }
        .page { display:none; }
        .page.active { display:block; }
    </style>
</head>
<body>

<div class="loader-overlay" id="ad-loader">
    <div class="spinner"></div>
</div>
<div class="toast" id="toast"></div>

<div class="container">
    <!-- ANA SAYFA -->
    <div id="p-home" class="page active">
        <div class="card" style="text-align:center;">
            <div class="balance-label">Mevcut Bakiye</div>
            <div class="balance-amount" id="st-bal">0.0000</div>
            <div style="font-size:14px; color:#94a3b8;">TON</div>
        </div>
        <div class="stats">
            <div class="stat-box"><span>Bugün İzlenen</span><b id="st-ads">0 / 50</b></div>
            <div class="stat-box"><span>Referans</span><b id="st-refs">0</b></div>
        </div>
        <p class="info-text">
            🎥 Reklam izleyerek anında TON kazanın.<br>
            Her başarılı reklam <strong>0.005 TON</strong> ekler.
        </p>
        <button class="btn btn-primary" id="btn-watch">
            🎥 Reklamı Başlat
        </button>
    </div>

    <!-- ÇEKİM -->
    <div id="p-withdraw" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px;">Çekim Talebi</h3>
            <div style="margin-bottom:15px;">
                <label style="font-size:13px; color:#64748b;">Cüzdan Adresi</label>
                <input type="text" id="wd-addr" placeholder="UQ..." style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-top:6px;">
            </div>
            <div style="margin-bottom:15px;">
                <label style="font-size:13px; color:#64748b;">Miktar (Min 0.5)</label>
                <input type="number" id="wd-amount" step="0.1" placeholder="0.5" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-top:6px;">
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span>Net Bakiye:</span><span id="wd-net-bal">0.0000 TON</span>
            </div>
            <button class="btn btn-primary" onclick="handleWithdraw()">Talebi Gönder</button>
        </div>
    </div>

    <!-- REFERANS -->
    <div id="p-ref" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px;">Arkadaşlarını Davet Et</h3>
            <p style="color:#475569; margin-bottom:20px;">Davet ettiğin her kullanıcı için kazanç sağla.</p>
            <div class="balance-label">Toplam Referans Kazancı</div>
            <div style="font-size:28px; font-weight:700; margin-bottom:20px;" id="st-ref-earn">0.0000 TON</div>
            <button class="btn btn-primary" onclick="copyRef()">Linki Kopyala</button>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchTab('p-home', this)"><i class="fa-solid fa-play"></i><span>Kazan</span></div>
    <div class="nav-item" onclick="switchTab('p-withdraw', this)"><i class="fa-solid fa-wallet"></i><span>Cüzdan</span></div>
    <div class="nav-item" onclick="switchTab('p-ref', this)"><i class="fa-solid fa-users"></i><span>Referans</span></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const firebaseConfig = {
        apiKey: "AIzaSyDcL3C-C3rCxxZTebym9t8lL55EYKu3I5A",
        authDomain: "gen-lang-client-0766979962.firebaseapp.com",
        projectId: "gen-lang-client-0766979962",
        storageBucket: "gen-lang-client-0766979962.firebasestorage.app",
        messagingSenderId: "327892498777",
        appId: "1:327892498777:web:49ce0bab8267562f033448"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_user";
    let state = { balance: 0, todayAds: 0, refs: 0, refEarn: 0 };

    const ads = new TelegramAdsController();
    ads.initialize({ pubId: "988708", appId: "7273", debug: false });

    let adInProgress = false;

    async function init() {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) state = doc.data();
        else await db.collection('users').doc(uid).set(state);
        updateUI();
    }

    function updateUI() {
        document.getElementById('st-bal').innerText = state.balance.toFixed(4);
        document.getElementById('wd-net-bal').innerText = state.balance.toFixed(4) + " TON";
        document.getElementById('st-ads').innerText = state.todayAds + " / 50";
        document.getElementById('st-refs').innerText = state.refs || 0;
        document.getElementById('st-ref-earn').innerText = (state.refEarn || 0).toFixed(4) + " TON";

        const btn = document.getElementById('btn-watch');
        if (state.todayAds >= 50) {
            btn.disabled = true;
            btn.innerText = "Günlük Limit Doldu";
        } else {
            btn.disabled = false;
            btn.innerText = "🎥 Reklamı Başlat";
        }
    }

    document.getElementById('btn-watch').addEventListener('click', async function() {
        if (adInProgress) return;
        if (state.todayAds >= 50) {
            showToast("Bugünlük limit doldu.", "error");
            return;
        }

        adInProgress = true;
        document.getElementById('ad-loader').style.display = 'flex';

        const timeout = setTimeout(() => {
            if (adInProgress) {
                adInProgress = false;
                document.getElementById('ad-loader').style.display = 'none';
                showToast("Reklam zaman aşımına uğradı.", "error");
            }
        }, 30000);

        try {
            await ads.triggerInterstitialVideo();
            // ödül ver
            state.balance += 0.005;
            state.todayAds += 1;
            await db.collection('users').doc(uid).update(state);
            updateUI();
            showToast("🎉 0.005 TON kazandınız!", "success");
        } catch (err) {
            console.error("Reklam hatası:", err);
            showToast("Reklam gösterilemedi.", "error");
        } finally {
            clearTimeout(timeout);
            document.getElementById('ad-loader').style.display = 'none';
            adInProgress = false;
        }
    });

    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} visible`;
        setTimeout(() => toast.classList.remove('visible'), 2800);
    }

    function handleWithdraw() {
        const addr = document.getElementById('wd-addr').value.trim();
        const amount = parseFloat(document.getElementById('wd-amount').value);
        if (!addr || addr.length < 10) return showToast("Geçerli TON adresi girin.", "error");
        if (isNaN(amount) || amount < 0.5) return showToast("Minimum 0.5 TON.", "error");
        if (amount > state.balance) return showToast("Yetersiz bakiye.", "error");

        db.collection('withdrawals').add({
            uid, addr, amount, date: new Date(), status: 'pending'
        }).then(() => {
            showToast("Çekim talebi alındı.", "success");
            document.getElementById('wd-addr').value = '';
            document.getElementById('wd-amount').value = '';
        });
    }

    function switchTab(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    }

    function copyRef() {
        const link = "https://t.me/ClashTonAdsBot?start=" + uid;
        navigator.clipboard.writeText(link);
        showToast("Davet linki kopyalandı.", "success");
    }

    window.onload = init;
</script>
</body>
</html>
