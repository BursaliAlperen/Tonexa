<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ClashTon • Profesyonel Reklam Sistemi</title>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #0a0a14;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --text: #f0f0f5;
            --text-dim: #8888aa;
            --accent: #a78bfa;
            --accent2: #7c3aed;
            --success: #10b981;
            --error: #ef4444;
            --radius: 28px;
            --radius-sm: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .bg-mesh {
            position: fixed; inset: 0; z-index:0; pointer-events: none;
            background: radial-gradient(circle at 30% 40%, rgba(167,139,250,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(124,58,237,0.08) 0%, transparent 50%);
        }
        .loader-overlay {
            position: fixed; inset:0; background: rgba(10,10,20,0.9);
            backdrop-filter: blur(20px); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .loader-ring {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 14px; color: var(--text-dim); font-weight: 500; text-align: center; padding: 0 20px; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(20,20,35,0.95); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08); color: white;
            padding: 16px 28px; border-radius: 40px; font-weight: 600; font-size: 14px;
            z-index: 9999; opacity: 0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--error); }

        .container { flex:1; overflow-y:auto; padding:20px 20px 110px; position:relative; z-index:1; }
        .card {
            background: var(--surface); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px 24px; margin-bottom: 20px;
        }
        .balance-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; font-weight: 600; }
        .balance-amount {
            font-size: 52px; font-weight: 800; line-height: 1;
            background: linear-gradient(135deg, #f0f0ff 0%, #c4b5fd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin: 8px 0 4px;
        }
        .balance-unit { font-size: 15px; color: var(--text-dim); letter-spacing: 2px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: var(--surface); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 18px 16px; text-align: center;
        }
        .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-card .value {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #f0f0ff 0%, #c4b5fd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .chart-container { margin: 20px 0 24px; padding: 16px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        canvas { width: 100% !important; height: auto !important; max-height: 220px; }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: var(--radius-sm);
            font-weight: 700; font-size: 16px; text-transform: uppercase;
            letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            color: white; box-shadow: 0 12px 30px rgba(124,58,237,0.3);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.25);
            box-shadow: none; cursor: not-allowed;
        }

        .nav {
            background: rgba(10,10,20,0.85); backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(3, 1fr);
            padding: 14px 0 22px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        }
        .nav-item {
            border: none; background: none; color: var(--text-dim);
            font-size: 10px; display: flex; flex-direction: column;
            align-items: center; gap: 8px; font-weight: 600;
            text-transform: uppercase; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }

        .page { display: none; animation: fadeSlide 0.35s ease; }
        .page.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="loader-overlay" id="ad-loader">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loader-msg">Video reklam aranıyor…</div>
</div>
<div class="toast" id="toast"></div>

<div class="container">
    <div id="p-home" class="page active">
        <div class="card" style="text-align:center;">
            <div class="balance-label">✦ Mevcut Bakiye</div>
            <div class="balance-amount" id="st-bal">0.0000</div>
            <div class="balance-unit">TON COIN</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="label">Bugün</div><div class="value" id="st-ads">0/50</div></div>
            <div class="stat-card"><div class="label">Referans</div><div class="value" id="st-refs">0</div></div>
        </div>

        <div class="chart-container">
            <div style="font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">📊 Haftalık Kazanç</div>
            <canvas id="chart-weekly"></canvas>
        </div>

        <button class="btn btn-primary" id="btn-watch">
            <i class="fa-solid fa-circle-play" style="margin-right:10px;"></i>
            Video İzle
        </button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchTab('p-home', this)"><i class="fa-solid fa-chart-line"></i><span>Kazan</span></div>
    <div class="nav-item"><i class="fa-solid fa-wallet"></i><span>Cüzdan</span></div>
    <div class="nav-item"><i class="fa-solid fa-users"></i><span>Ref</span></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "dev_user";
    const DAILY_LIMIT = 50;
    const REWARD_AMOUNT = 0.005;

    // STATE YÖNETİMİ
    let state = JSON.parse(localStorage.getItem(`clashton_${uid}`)) || {
        balance: 0, todayAds: 0, refs: 0, refEarn: 0,
        dailyEarnings: { mon:0, tue:0, wed:0, thu:0, fri:0, sat:0, sun:0 }
    };

    function save() { localStorage.setItem(`clashton_${uid}`, JSON.stringify(state)); }

    // REKLAM KONTROLÜ
    window.TelegramAdsController = new TelegramAdsController();
    window.TelegramAdsController.initialize({ pubId: "988708", appId: "7273", debug: false });

    let adInProgress = false;

    async function tryOnce(fn) {
        try { return await fn(); } catch (e) { return false; }
    }

    async function startVideoAd() {
        if (adInProgress) return;
        if (state.todayAds >= DAILY_LIMIT) return showToast("Limit doldu!", "error");

        adInProgress = true;
        const loader = document.getElementById('ad-loader');
        const msg = document.getElementById('loader-msg');
        loader.style.display = 'flex';

        let success = false;

        // 1. ADIM: VİDEO REKLAM DENE (2 KEZ)
        for(let i=0; i<2; i++) {
            msg.innerText = `Video reklam aranıyor (${i+1}/2)…`;
            if(i > 0) await new Promise(r => setTimeout(r, 2000));
            
            const ok = await tryOnce(() => window.TelegramAdsController.triggerInterstitialVideo());
            if(ok) { success = true; break; }
        }

        // 2. ADIM: VİDEO YOKSA STATİK DENE (FALLBACK)
        if(!success) {
            msg.innerText = "Video bulunamadı, alternatif aranıyor…";
            await new Promise(r => setTimeout(r, 1500));
            const ok = await tryOnce(() => window.TelegramAdsController.triggerInterstitial());
            if(ok) success = true;
        }

        if(success) {
            state.balance += REWARD_AMOUNT;
            state.todayAds += 1;
            const keys = ['sun','mon','tue','wed','thu','fri','sat'];
            const today = keys[new Date().getDay()];
            state.dailyEarnings[today] += REWARD_AMOUNT;
            save();
            updateUI();
            showToast(`🎉 +${REWARD_AMOUNT} TON Kazanıldı!`, "success");
        } else {
            showToast("Şu an uygun reklam yok, az sonra tekrar dene.", "error");
        }

        loader.style.display = 'none';
        adInProgress = false;
    }

    document.getElementById('btn-watch').addEventListener('click', startVideoAd);

    function updateUI() {
        document.getElementById('st-bal').innerText = state.balance.toFixed(4);
        document.getElementById('st-ads').innerText = `${state.todayAds}/${DAILY_LIMIT}`;
        const btn = document.getElementById('btn-watch');
        if (state.todayAds >= DAILY_LIMIT) {
            btn.disabled = true;
            btn.innerHTML = 'Limit Doldu';
        }
    }

    function showToast(m, t) {
        const el = document.getElementById('toast');
        el.innerText = m;
        el.className = `toast ${t} visible`;
        setTimeout(() => el.classList.remove('visible'), 2500);
    }

    updateUI();
</script>
</body>
</html>
